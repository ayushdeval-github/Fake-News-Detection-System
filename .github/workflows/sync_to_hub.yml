name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix the Node.js deprecation warning
      - uses: actions/checkout@v4 
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Explicitly target the 'main' branch at the end of the command
          git push --force https://ayushdeval503:$HF_TOKEN@huggingface.co/spaces/ayushdeval503/fake_news_detector main